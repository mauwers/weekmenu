<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekmenu</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#26362A">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Weekmenu">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#26362A;
    --bg-card:#2F4234;
    --bg-card-hover:#374E3D;
    --paper:#F2ECDD;
    --paper-shadow:#DCD3B8;
    --ink:#F2ECDD;
    --ink-soft:#AFC0A9;
    --ink-faint:#7E9078;
    --mustard:#E7A93F;
    --tomato:#C1432A;
    --tomato-dark:#9C331F;
    --line: rgba(242,236,221,0.14);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:1100px;margin:0 auto;padding:28px 18px 80px;}

  /* header */
  .chalk-header{text-align:center;margin-bottom:22px;}
  .chalk-header h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:2.3rem;
    margin:0 0 4px;
    letter-spacing:0.5px;
  }
  .chalk-header .sub{color:var(--ink-soft); font-size:0.92rem;}

  .weeknav{
    display:flex; align-items:center; justify-content:center; gap:14px;
    margin:18px 0 26px;
  }
  .weeknav button{
    background:none;border:1px solid var(--line);color:var(--ink);
    border-radius:999px; width:36px;height:36px; cursor:pointer;
    font-size:1rem; transition:background .15s;
  }
  .weeknav button:hover{background:var(--bg-card-hover);}
  .weeknav .label{
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:1.15rem;
    min-width:210px; text-align:center;
  }

  /* day grid */
  .days{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
    margin-bottom:30px;
  }
  @media (max-width:820px){
    .days{grid-template-columns:1fr; }
  }
  .day-card{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 12px;
    cursor:pointer;
    min-height:150px;
    display:flex;flex-direction:column;justify-content:space-between;
    transition:background .15s, transform .1s;
  }
  .day-card:hover{background:var(--bg-card-hover); transform:translateY(-2px);}
  .day-card .daynaam{
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:1rem;
  }
  .day-card .datum{color:var(--ink-faint); font-size:0.75rem; margin-bottom:8px;}
  .day-card .gerecht{
    font-size:0.95rem; font-weight:500; line-height:1.3;
    color:var(--ink);
  }
  .day-card .leeg{color:var(--ink-faint); font-style:italic; font-size:0.85rem;}
  .day-card .chip{
    margin-top:10px;
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(231,169,63,0.15);
    color:var(--mustard);
    border-radius:999px;
    padding:3px 10px;
    font-size:0.72rem;
    font-weight:600;
    width:fit-content;
  }

  /* buttons */
  .row-actions{display:flex; justify-content:center; gap:12px; margin:8px 0 34px; flex-wrap:wrap;}
  .btn{
    font-family:'Work Sans', sans-serif; font-weight:600; font-size:0.9rem;
    border:none; border-radius:999px; padding:11px 22px; cursor:pointer;
    transition:transform .1s, opacity .15s;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--tomato); color:var(--paper);}
  .btn-primary:hover{background:var(--tomato-dark);}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--ink);}
  .btn-ghost:hover{background:var(--bg-card-hover);}

  /* receipt / shopping list */
  .receipt-wrap{display:flex; justify-content:center;}
  .receipt{
    background:var(--paper);
    color:#2A2A22;
    width:100%; max-width:420px;
    border-radius:6px;
    padding:26px 22px 30px;
    box-shadow:0 14px 0 -6px var(--paper-shadow), 0 18px 30px rgba(0,0,0,0.35);
    font-family:'IBM Plex Mono', monospace;
    position:relative;
  }
  .receipt::before{
    content:"";
    position:absolute; top:-8px; left:0; right:0; height:16px;
    background:
      radial-gradient(circle at 8px 8px, var(--bg) 8px, transparent 9px) repeat-x;
    background-size:16px 16px;
  }
  .receipt h2{
    font-family:'Baloo 2', sans-serif; text-align:center; font-size:1.2rem;
    margin:0 0 2px; color:#2A2A22;
  }
  .receipt .receipt-sub{text-align:center; font-size:0.7rem; color:#6b6b58; margin-bottom:14px;}
  .receipt hr{border:none; border-top:1px dashed #B9AF8F; margin:12px 0;}
  .receipt-item{
    display:flex; justify-content:space-between; gap:10px;
    font-size:0.85rem; padding:5px 0; align-items:flex-start;
    cursor:pointer; user-select:none;
  }
  .receipt-item.checked{opacity:0.4; text-decoration:line-through;}
  .receipt-item .naam{flex:1;}
  .receipt-empty{text-align:center; color:#8a8a72; font-size:0.85rem; padding:20px 0;}
  .receipt-total{
    display:flex; justify-content:space-between; font-size:0.8rem;
    margin-top:10px; color:#6b6b58;
  }
  .receipt-add{display:flex; gap:6px; margin:14px 0 10px;}
  .receipt-add input{
    flex:1; background:#fff; border:1px solid #d8d0b8; border-radius:6px;
    padding:8px 10px; font-family:'IBM Plex Mono', monospace; font-size:0.8rem; color:#2A2A22;
  }
  .receipt-add button{
    padding:8px 16px; font-size:0.85rem; white-space:nowrap;
  }
  .receipt-extra-label{
    font-size:0.65rem; color:#8a8a72; letter-spacing:0.6px; margin:12px 0 2px; font-weight:600;
  }
  .del-extra{
    background:none; border:none; color:var(--tomato); cursor:pointer;
    font-size:0.85rem; padding:0 0 0 8px; line-height:1;
  }

  /* modal */
  .overlay{
    position:fixed; inset:0; background:rgba(15,20,15,0.6);
    display:flex; align-items:center; justify-content:center;
    padding:16px; z-index:50;
  }
  .modal{
    background:var(--bg-card); border-radius:var(--radius);
    width:100%; max-width:480px; max-height:88vh; overflow-y:auto;
    padding:22px; border:1px solid var(--line);
  }
  .modal h3{font-family:'Baloo 2', sans-serif; margin-top:0;}
  .modal label{display:block; font-size:0.8rem; color:var(--ink-soft); margin:14px 0 6px;}
  .modal input, .modal select{
    width:100%; background:var(--bg); border:1px solid var(--line); color:var(--ink);
    border-radius:8px; padding:9px 10px; font-family:inherit; font-size:0.9rem;
  }
  .persoon-chips{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;}
  .persoon-chip{
    padding:6px 13px; border-radius:999px; border:1px solid var(--line);
    background:var(--bg); cursor:pointer; font-size:0.82rem; color:var(--ink-soft);
  }
  .persoon-chip.actief{background:var(--mustard); color:#2A2A22; border-color:var(--mustard); font-weight:600;}
  .gerecht-lijst{max-height:220px; overflow-y:auto; margin-top:6px;}
  .gerecht-optie{
    padding:10px 12px; border-radius:8px; cursor:pointer; font-size:0.9rem;
    display:flex; justify-content:space-between; align-items:center;
  }
  .gerecht-optie:hover{background:var(--bg);}
  .gerecht-optie .ing-count{color:var(--ink-faint); font-size:0.72rem;}
  .modal-actions{display:flex; gap:10px; margin-top:20px; justify-content:flex-end;}
  .ing-row{display:flex; gap:8px; margin-bottom:8px;}
  .ing-row input{flex:1;}
  .ing-row input.hoev{flex:0 0 70px;}
  .link-btn{background:none;border:none;color:var(--mustard); cursor:pointer; font-size:0.82rem; padding:4px 0;}
  .close-x{position:absolute; top:14px; right:16px; background:none; border:none; color:var(--ink-soft); font-size:1.3rem; cursor:pointer;}
  .modal{position:relative;}
  .tab-bar{display:flex; gap:8px; margin-bottom:16px;}
  .tab-bar button{
    flex:1; background:var(--bg); border:1px solid var(--line); color:var(--ink-soft);
    padding:8px; border-radius:8px; cursor:pointer; font-size:0.82rem; font-weight:600;
  }
  .tab-bar button.actief{background:var(--tomato); color:var(--paper); border-color:var(--tomato);}
  .loading{text-align:center; color:var(--ink-faint); padding:30px; font-size:0.85rem;}
  .footnote{text-align:center; color:var(--ink-faint); font-size:0.72rem; margin-top:26px;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading">Weekmenu wordt geladen…</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVpTQ7j6_TrbHkk3neeb2JOMMeK_64Il0",
  authDomain: "gezin-weekmenu.firebaseapp.com",
  projectId: "gezin-weekmenu",
  storageBucket: "gezin-weekmenu.firebasestorage.app",
  messagingSenderId: "719548122711",
  appId: "1:719548122711:web:ec529f6a463f48051dc512"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const DAGEN = ["Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag","Zondag"];
const PERSONEN = ["Marjan","Boris","Amelie","Paulien","Juliette","Allemaal"];
let gerechten = [];        // {id, naam, ingredienten:[{naam,hoeveelheid,eenheid}]}
let planningCache = {};    // weekKey -> { slots:[...x7], checked:{...} }
let currentMonday = getMonday(new Date());
let unsubWeek = null;
let ready = false;

function getMonday(d){
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day===0?-6:1);
  const monday = new Date(date.setDate(diff));
  monday.setHours(0,0,0,0);
  return monday;
}
function weekKey(monday){ return monday.toISOString().slice(0,10); }
function fmtDate(d){ return d.toLocaleDateString('nl-BE',{day:'numeric',month:'short'}); }
function addDays(d,n){ const nd=new Date(d); nd.setDate(nd.getDate()+n); return nd; }
function uid(){ return Math.random().toString(36).slice(2,9); }
function emptyWeek(){ return {slots: DAGEN.map(()=>({gerechtId:null, persoon:null, type:'thuis', notitie:''})), checked:{}, extraItems:[]}; }
const TYPE_INFO = {
  thuis:       {label:'Thuis gekookt',   icon:'🍳'},
  afhalen:     {label:'Afhalen',         icon:'🥡'},
  buitenshuis: {label:'Eten buitenshuis',icon:'🍽️'},
  restjes:     {label:'Restjes',         icon:'♻️'}
};

function defaultGerechten(){
  return [
    {id:uid(), naam:"Spaghetti bolognese", ingredienten:[
      {naam:"Gehakt",hoeveelheid:"500",eenheid:"g"},
      {naam:"Spaghetti",hoeveelheid:"500",eenheid:"g"},
      {naam:"Tomatensaus",hoeveelheid:"2",eenheid:"pot"},
      {naam:"Ui",hoeveelheid:"1",eenheid:"stuk"}]},
    {id:uid(), naam:"Kip met groentjes", ingredienten:[
      {naam:"Kipfilet",hoeveelheid:"600",eenheid:"g"},
      {naam:"Broccoli",hoeveelheid:"1",eenheid:"stuk"},
      {naam:"Aardappelen",hoeveelheid:"1",eenheid:"kg"}]},
    {id:uid(), naam:"Pizza", ingredienten:[
      {naam:"Pizzadeeg",hoeveelheid:"4",eenheid:"stuk"},
      {naam:"Mozzarella",hoeveelheid:"2",eenheid:"stuk"},
      {naam:"Tomatensaus",hoeveelheid:"1",eenheid:"pot"}]}
  ];
}

const gerechtenDocRef = doc(db, "weekmenu", "gerechten");
function weekDocRef(key){ return doc(db, "weekmenu", "week_"+key); }

// ---------- init & realtime sync ----------
async function initApp(){
  try{
    const snap = await getDoc(gerechtenDocRef);
    if(!snap.exists()){
      gerechten = defaultGerechten();
      await setDoc(gerechtenDocRef, {items: gerechten});
    }
  }catch(e){
    console.error("Kon gerechten niet initialiseren:", e);
    gerechten = defaultGerechten();
  }

  onSnapshot(gerechtenDocRef, (snap)=>{
    if(snap.exists()){
      gerechten = snap.data().items || [];
      if(ready) render();
    }
  }, (err)=>{ console.error("Sync-fout gerechten:", err); });

  subscribeWeek(currentMonday);
  ready = true;
}

function subscribeWeek(monday){
  if(unsubWeek) unsubWeek();
  const key = weekKey(monday);
  unsubWeek = onSnapshot(weekDocRef(key), (snap)=>{
    if(snap.exists()){
      const data = snap.data();
      data.slots = (data.slots||[]).map(s=>({gerechtId:s.gerechtId||null, persoon:s.persoon||null, type:s.type||'thuis', notitie:s.notitie||''}));
      while(data.slots.length<7) data.slots.push({gerechtId:null, persoon:null, type:'thuis', notitie:''});
      data.checked = data.checked || {};
      data.extraItems = data.extraItems || [];
      planningCache[key] = data;
    }else{
      planningCache[key] = emptyWeek();
    }
    if(weekKey(currentMonday)===key) render();
  }, (err)=>{
    console.error("Sync-fout week:", err);
    planningCache[key] = planningCache[key] || emptyWeek();
    render();
  });
}

async function saveGerechten(){
  try{
    await setDoc(gerechtenDocRef, {items: gerechten});
  }catch(e){
    console.error("Fout bij opslaan gerechten:", e);
    alert("Kon het gerecht niet opslaan (verbindingsfout). Controleer je internetverbinding en probeer het nog eens.");
    throw e;
  }
}

async function saveWeek(monday){
  const key = weekKey(monday);
  try{
    await setDoc(weekDocRef(key), planningCache[key]);
  }catch(e){
    console.error("Fout bij opslaan weekplanning:", e);
    alert("Kon de weekplanning niet opslaan (verbindingsfout). Controleer je internetverbinding en probeer het nog eens.");
  }
}

// ---------- rendering ----------
function render(){
  const app = document.getElementById('app');
  const key = weekKey(currentMonday);
  const weekData = planningCache[key] || emptyWeek();
  const plan = weekData.slots;
  const sunday = addDays(currentMonday,6);

  app.innerHTML = `
    <div class="chalk-header">
      <h1>🍽️ Wat eten we deze week?</h1>
      <div class="sub">Vul aan, kies wie kookt, en trek er automatisch een boodschappenlijst uit.</div>
    </div>

    <div class="weeknav">
      <button id="prevWeek">‹</button>
      <div class="label">${fmtDate(currentMonday)} – ${fmtDate(sunday)}</div>
      <button id="nextWeek">›</button>
    </div>

    <div class="days">
      ${plan.map((slot,i)=>renderDayCard(slot,i)).join('')}
    </div>

    <div class="row-actions">
      <button class="btn btn-ghost" id="beheerBtn">📖 Gerechten beheren</button>
    </div>

    <div class="receipt-wrap">
      ${renderReceipt(plan, weekData.checked||{}, weekData.extraItems||[])}
    </div>

    <div class="footnote">Alles wat je hier invult wordt live gedeeld met heel het gezin.</div>
  `;

  document.getElementById('prevWeek').onclick = ()=>{
    currentMonday = addDays(currentMonday,-7);
    subscribeWeek(currentMonday);
    render();
  };
  document.getElementById('nextWeek').onclick = ()=>{
    currentMonday = addDays(currentMonday,7);
    subscribeWeek(currentMonday);
    render();
  };
  document.getElementById('beheerBtn').onclick = ()=>openGerechtenBeheer();
  plan.forEach((slot,i)=>{
    document.getElementById('day-'+i).onclick = ()=>openDagKeuze(i);
  });
  document.querySelectorAll('.receipt-item[data-key]').forEach(el=>{
    el.onclick = async (evt)=>{
      if(evt.target.closest('.del-extra')) return;
      const k = el.dataset.key;
      const wd = planningCache[key];
      wd.checked = wd.checked || {};
      wd.checked[k] = !wd.checked[k];
      await saveWeek(currentMonday);
    };
  });
  document.querySelectorAll('.del-extra').forEach(btn=>{
    btn.onclick = async (evt)=>{
      evt.stopPropagation();
      const wd = planningCache[key];
      wd.extraItems = (wd.extraItems||[]).filter(it=>it.id!==btn.dataset.delExtra);
      if(wd.checked) delete wd.checked['extra:'+btn.dataset.delExtra];
      await saveWeek(currentMonday);
    };
  });
  const extraAddBtn = document.getElementById('extraAddBtn');
  if(extraAddBtn){
    const doAdd = async ()=>{
      const input = document.getElementById('extraInput');
      const naam = input.value.trim();
      if(!naam) return;
      const wd = planningCache[key];
      wd.extraItems = wd.extraItems || [];
      wd.extraItems.push({id:uid(), naam});
      input.value = '';
      await saveWeek(currentMonday);
    };
    extraAddBtn.onclick = doAdd;
    document.getElementById('extraInput').addEventListener('keydown', (e)=>{
      if(e.key==='Enter') doAdd();
    });
  }
}

function renderDayCard(slot,i){
  const dag = DAGEN[i];
  const datum = fmtDate(addDays(currentMonday,i));
  const type = slot.type || 'thuis';
  let hoofdregel;
  if(type === 'thuis'){
    const gerecht = gerechten.find(g=>g.id===slot.gerechtId);
    hoofdregel = gerecht ? `<div class="gerecht">${gerecht.naam}</div>` : `<div class="leeg">Nog niks gekozen</div>`;
  }else{
    const info = TYPE_INFO[type];
    hoofdregel = `<div class="gerecht">${info.icon} ${info.label}${slot.notitie ? '<br><span style="font-weight:400;font-size:0.82rem;color:var(--ink-soft);">'+slot.notitie+'</span>' : ''}</div>`;
  }
  return `
    <div class="day-card" id="day-${i}">
      <div>
        <div class="daynaam">${dag}</div>
        <div class="datum">${datum}</div>
        ${hoofdregel}
      </div>
      ${slot.persoon ? `<div class="chip">👤 ${slot.persoon}</div>` : ''}
    </div>
  `;
}

function renderReceipt(plan, checked, extraItems){
  extraItems = extraItems || [];
  const gekozen = plan.filter(s=>(s.type||'thuis')==='thuis' && s.gerechtId);
  const agg = {};
  gekozen.forEach(s=>{
    const g = gerechten.find(x=>x.id===s.gerechtId);
    if(!g) return;
    g.ingredienten.forEach(ing=>{
      const k = (ing.naam.trim().toLowerCase())+'|'+(ing.eenheid||'').trim().toLowerCase();
      if(!agg[k]) agg[k] = {naam:ing.naam, eenheid:ing.eenheid, totaal:0, teksten:[]};
      const num = parseFloat((ing.hoeveelheid||'').toString().replace(',','.'));
      if(!isNaN(num)) agg[k].totaal += num;
      else agg[k].teksten.push(ing.hoeveelheid);
    });
  });
  const items = Object.entries(agg).sort((a,b)=>a[1].naam.localeCompare(b[1].naam));
  const totaalAantal = items.length + extraItems.length;

  const gerechtRows = items.map(([k,v])=>{
    const hoev = v.totaal>0 ? (v.totaal+' '+(v.eenheid||'')).trim() : (v.teksten.join(', ')||'');
    const isChecked = checked[k];
    return `<div class="receipt-item ${isChecked?'checked':''}" data-key="${k}">
      <span class="naam">${isChecked?'✓ ':'• '}${v.naam}</span>
      <span>${hoev}</span>
    </div>`;
  }).join('');

  const extraRows = extraItems.map(item=>{
    const k = 'extra:'+item.id;
    const isChecked = checked[k];
    return `<div class="receipt-item ${isChecked?'checked':''}" data-key="${k}">
      <span class="naam">${isChecked?'✓ ':'• '}${item.naam}</span>
      <span><button class="del-extra" data-del-extra="${item.id}">✕</button></span>
    </div>`;
  }).join('');

  return `<div class="receipt">
    <h2>Boodschappenlijst</h2>
    <div class="receipt-sub">week van ${fmtDate(currentMonday)}${gekozen.length ? ' · '+gekozen.length+' maaltijden' : ''}</div>
    <hr>
    ${totaalAantal===0
      ? '<div class="receipt-empty">Kies gerechten voor de week, of voeg hieronder een extra item toe.</div>'
      : gerechtRows + (extraItems.length ? `<div class="receipt-extra-label">EXTRA</div>${extraRows}` : '')
    }
    <div class="receipt-add">
      <input type="text" id="extraInput" placeholder="Extra item… (bv. hondenvoer)">
      <button class="btn btn-primary" id="extraAddBtn">+ Toevoegen</button>
    </div>
    <hr>
    <div class="receipt-total"><span>${totaalAantal} artikelen</span><span>tik af = check</span></div>
  </div>`;
}

// ---------- Dag keuze modal ----------
function openDagKeuze(dayIndex){
  const key = weekKey(currentMonday);
  const slot = planningCache[key].slots[dayIndex];
  const magKiezen = dayIndex >= 4; // enkel Vrijdag(4)/Zaterdag(5)/Zondag(6)
  let gekozenType = magKiezen ? (slot.type || 'thuis') : 'thuis';
  let gekozenId = slot.gerechtId;
  let gekozenPersoon = slot.persoon;
  let gekozenNotitie = slot.notitie || '';

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <button class="close-x">✕</button>
      <h3>${DAGEN[dayIndex]} ${fmtDate(addDays(currentMonday,dayIndex))}</h3>

      ${magKiezen ? `
      <div class="tab-bar" id="typeTabs">
        ${Object.entries(TYPE_INFO).map(([t,info])=>`<button data-t="${t}" class="${t===gekozenType?'actief':''}">${info.icon} ${info.label}</button>`).join('')}
      </div>
      ` : ''}

      <label>Wie kookt of eet mee?</label>
      <div class="persoon-chips" id="persoonChips">
        ${PERSONEN.map(p=>`<div class="persoon-chip ${slot.persoon===p?'actief':''}" data-p="${p}">${p}</div>`).join('')}
      </div>

      <div id="typeContent"></div>

      <div class="modal-actions">
        <button class="btn btn-ghost" id="wisBtn">Wissen</button>
        <button class="btn btn-primary" id="klaarBtn">Klaar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  function renderLijst(filter=''){
    const lijst = document.getElementById('gerechtLijst');
    if(!lijst) return;
    const f = filter.toLowerCase();
    lijst.innerHTML = gerechten
      .filter(g=>g.naam.toLowerCase().includes(f))
      .map(g=>`<div class="gerecht-optie ${g.id===gekozenId?'actief':''}" data-id="${g.id}" style="${g.id===gekozenId?'background:var(--bg-card-hover);':''}">
        <span>${g.naam}</span><span class="ing-count">${g.ingredienten.length} ingr.</span>
      </div>`).join('') || '<div class="receipt-empty" style="color:var(--ink-faint);padding:14px 0;">Niks gevonden</div>';
    lijst.querySelectorAll('.gerecht-optie').forEach(el=>{
      el.onclick = ()=>{ gekozenId = el.dataset.id; renderLijst(document.getElementById('zoekGerecht').value); };
    });
  }

  function renderTypeContent(){
    const el = document.getElementById('typeContent');
    if(gekozenType === 'thuis'){
      el.innerHTML = `
        <label>Kies een gerecht</label>
        <input type="text" id="zoekGerecht" placeholder="Zoeken…">
        <div class="gerecht-lijst" id="gerechtLijst"></div>
        <button class="link-btn" id="nieuwGerechtBtn">+ Nieuw gerecht toevoegen</button>
      `;
      renderLijst();
      document.getElementById('zoekGerecht').oninput = (e)=>renderLijst(e.target.value);
      document.getElementById('nieuwGerechtBtn').onclick = ()=>{
        document.body.removeChild(overlay);
        openNieuwGerecht((nieuwId)=>{
          planningCache[key].slots[dayIndex] = {gerechtId:nieuwId, persoon:gekozenPersoon, type:'thuis', notitie:''};
          openDagKeuze(dayIndex);
        });
      };
    }else{
      const info = TYPE_INFO[gekozenType];
      const placeholder = gekozenType==='afhalen' ? 'Pizza Hut, Frituur Jan…' : gekozenType==='buitenshuis' ? 'Restaurant naam…' : 'Wat er nog over is…';
      el.innerHTML = `
        <label>Notitie (optioneel)</label>
        <input type="text" id="notitieVeld" placeholder="bv. ${placeholder}" value="${gekozenNotitie}">
        <div class="receipt-empty" style="color:var(--ink-faint);padding:14px 0 0;text-align:left;">${info.icon} Deze dag telt niet mee in de boodschappenlijst.</div>
      `;
      document.getElementById('notitieVeld').oninput = (e)=>{ gekozenNotitie = e.target.value; };
    }
  }
  renderTypeContent();

  overlay.querySelectorAll('#typeTabs button').forEach(btn=>{
    btn.onclick = ()=>{
      gekozenType = btn.dataset.t;
      overlay.querySelectorAll('#typeTabs button').forEach(b=>b.classList.toggle('actief', b.dataset.t===gekozenType));
      renderTypeContent();
    };
  });

  overlay.querySelectorAll('.persoon-chip').forEach(el=>{
    el.onclick = ()=>{
      gekozenPersoon = (gekozenPersoon===el.dataset.p) ? null : el.dataset.p;
      overlay.querySelectorAll('.persoon-chip').forEach(c=>c.classList.toggle('actief', c.dataset.p===gekozenPersoon));
    };
  });

  document.getElementById('wisBtn').onclick = async ()=>{
    planningCache[key].slots[dayIndex] = {gerechtId:null, persoon:null, type:'thuis', notitie:''};
    await saveWeek(currentMonday);
    document.body.removeChild(overlay);
  };
  document.getElementById('klaarBtn').onclick = async ()=>{
    planningCache[key].slots[dayIndex] = {
      gerechtId: gekozenType==='thuis' ? gekozenId : null,
      persoon: gekozenPersoon,
      type: gekozenType,
      notitie: gekozenType!=='thuis' ? gekozenNotitie : ''
    };
    await saveWeek(currentMonday);
    document.body.removeChild(overlay);
  };
  document.querySelector('.close-x').onclick = ()=>document.body.removeChild(overlay);
}

// ---------- Nieuw gerecht modal ----------
function openNieuwGerecht(onSaved){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  let rijen = [{naam:'',hoeveelheid:'',eenheid:''}];
  overlay.innerHTML = `
    <div class="modal">
      <button class="close-x">✕</button>
      <h3>Nieuw gerecht</h3>
      <label>Naam van het gerecht</label>
      <input type="text" id="naamGerecht" placeholder="bv. Lasagne">
      <label>Ingrediënten</label>
      <div id="ingRows"></div>
      <button class="link-btn" id="addIngBtn">+ Ingrediënt toevoegen</button>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="annuleerBtn">Annuleren</button>
        <button class="btn btn-primary" id="bewaarBtn">Bewaren</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  function renderRows(){
    const el = document.getElementById('ingRows');
    el.innerHTML = rijen.map((r,i)=>`
      <div class="ing-row">
        <input type="text" placeholder="ingrediënt" value="${r.naam}" data-i="${i}" data-f="naam">
        <input type="text" class="hoev" placeholder="hoev." value="${r.hoeveelheid}" data-i="${i}" data-f="hoeveelheid">
        <input type="text" class="hoev" placeholder="eenh." value="${r.eenheid}" data-i="${i}" data-f="eenheid">
      </div>
    `).join('');
    el.querySelectorAll('input').forEach(inp=>{
      inp.oninput = ()=>{ rijen[inp.dataset.i][inp.dataset.f] = inp.value; };
    });
  }
  renderRows();

  document.getElementById('addIngBtn').onclick = ()=>{
    rijen.push({naam:'',hoeveelheid:'',eenheid:''});
    renderRows();
  };
  document.getElementById('annuleerBtn').onclick = ()=>document.body.removeChild(overlay);
  document.querySelector('.close-x').onclick = ()=>document.body.removeChild(overlay);

  document.getElementById('bewaarBtn').onclick = async ()=>{
    const naam = document.getElementById('naamGerecht').value.trim();
    if(!naam){ alert('Geef het gerecht een naam.'); return; }
    const ingredienten = rijen.filter(r=>r.naam.trim());
    const nieuw = {id:uid(), naam, ingredienten};
    const bewaarBtn = document.getElementById('bewaarBtn');
    bewaarBtn.disabled = true;
    bewaarBtn.textContent = 'Bewaren…';
    try{
      gerechten.push(nieuw);
      await saveGerechten();
      document.body.removeChild(overlay);
      onSaved(nieuw.id);
    }catch(e){
      gerechten = gerechten.filter(g=>g.id!==nieuw.id);
      bewaarBtn.disabled = false;
      bewaarBtn.textContent = 'Bewaren';
    }
  };
}

// ---------- Gerechten beheren ----------
function openGerechtenBeheer(){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <button class="close-x">✕</button>
      <h3>Gerechten beheren</h3>
      <div id="beheerLijst"></div>
      <button class="link-btn" id="nieuwBtn2">+ Nieuw gerecht toevoegen</button>
    </div>
  `;
  document.body.appendChild(overlay);

  function renderBeheer(){
    document.getElementById('beheerLijst').innerHTML = gerechten.map(g=>`
      <div class="gerecht-optie" style="border-bottom:1px solid var(--line);">
        <span>${g.naam} <span class="ing-count">(${g.ingredienten.length} ingr.)</span></span>
        <button class="link-btn" data-del="${g.id}" style="color:var(--tomato);">verwijder</button>
      </div>
    `).join('') || '<div class="receipt-empty" style="color:var(--ink-faint);">Nog geen gerechten.</div>';
    document.querySelectorAll('[data-del]').forEach(btn=>{
      btn.onclick = async ()=>{
        const verwijderd = gerechten.find(g=>g.id===btn.dataset.del);
        gerechten = gerechten.filter(g=>g.id!==btn.dataset.del);
        try{
          await saveGerechten();
        }catch(e){
          gerechten.push(verwijderd);
        }
        renderBeheer();
      };
    });
  }
  renderBeheer();
  document.getElementById('nieuwBtn2').onclick = ()=>{
    document.body.removeChild(overlay);
    openNieuwGerecht(()=>{ openGerechtenBeheer(); });
  };
  document.querySelector('.close-x').onclick = ()=>document.body.removeChild(overlay);
}

initApp();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch((e) => {
      console.error('Service worker registratie mislukt:', e);
    });
  });
}
